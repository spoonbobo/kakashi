services:
  # database services
  kakashi-redis:
    image: redis:latest
    container_name: kakashi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
    networks:
      - app-network

  kakashi-psqldb:
    image: postgres:latest
    container_name: kakashi-psqldb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_seeds:/docker-entrypoint-initdb.d
    networks:
      - app-network

  kakashi-qdrant:
    image: qdrant/qdrant
    container_name: kakashi-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

  # main application services
  kakashi-chat_server:
    build:
      context: .
      dockerfile: docker/Dockerfile.chat_server
    container_name: kakashi-chat_server
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://kakashi-redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - NODE_ENV=${NODE_ENV}
    volumes:
      - .:/app
    depends_on:
      - kakashi-redis
      - kakashi-psqldb
    networks:
      - app-network

  kakashi-alert_server:
    build:
      context: .
      dockerfile: docker/Dockerfile.alert_server
    container_name: kakashi-alert_server
    ports:
      - "3002:3002"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://kakashi-redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - NODE_ENV=${NODE_ENV}
    volumes:
      - .:/app
    depends_on:
      - kakashi-redis
      - kakashi-psqldb
    networks:
      - app-network

  kakashi-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
    container_name: kakashi-app
    environment:
      - VERSION=${VERSION}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGHOST=${PGHOST}
      - PGDATABASE=${PGDATABASE}
      - PGPORT=${PGPORT}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_MCP_CLIENT_URL=${MCP_CLIENT_URL}
      - NEXT_PUBLIC_JWT_SECRET=${NEXT_PUBLIC_JWT_SECRET}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_NOTIFICATION_SERVER_URL=${NEXT_PUBLIC_NOTIFICATION_SERVER_URL}
    volumes:
      - .:/app
    depends_on:
      - kakashi-chat_server
      - kakashi-psqldb
    networks:
      - app-network

  # mcp
  kakashi-mcp_client:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp.client
    container_name: kakashi-mcp_client
    depends_on:
      - kakashi-chat_server
      - kakashi-psqldb
      - kakashi-app
      - kakashi-llm
    ports:
      - "34430:34430"
    volumes:
      - ./mcp/client:/app
      - ./mcp/servers:/servers
      - ./mcp/agent_home:/agent_home
    environment:
      - SOCKET_URL=${NEXT_PUBLIC_WS_URL}
      - CLIENT_URL=${CLIENT_URL}
      - AGENTUSER=${AGENTUSER}
      - AGENTPASSWORD=${AGENTPASSWORD}
      - OLLAMA_API_BASE_URL=http://kakashi-llm:11434
      - OLLAMA_MODEL=llama3.2:latest
      - BYPASSER_MODEL=gemma3:4b
      - EMBED_MODEL=nomic-embed-text:latest
    networks:
      - app-network

  kakashi-llm:
    image: ollama/ollama:latest
    container_name: kakashi-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network

  # supporting services
  kakashi-nginx:
    image: nginx:latest
    container_name: kakashi-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - kakashi-app
      - kakashi-chat_server
      - kakashi-mcp_client
    networks:
      - app-network

  kakashi-pgadmin:
    image: dpage/pgadmin4
    container_name: kakashi-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - kakashi-psqldb
    networks:
      - app-network

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  ollama_data:

networks:
  app-network:
    driver: bridge
