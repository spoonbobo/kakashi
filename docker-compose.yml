services:
  kakashi-redis:
    image: redis:latest
    container_name: kakashi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - app-network

  kakashi-psqldb:
    image: postgres:latest
    container_name: kakashi-psqldb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_seeds:/docker-entrypoint-initdb.d
    networks:
      - app-network

  kakashi-qdrant:
    image: qdrant/qdrant
    container_name: kakashi-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

  kakashi-pgadmin:
    image: dpage/pgadmin4
    container_name: kakashi-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - kakashi-psqldb
    networks:
      - app-network

  kakashi-chat_server:
    build:
      context: .
      dockerfile: docker/Dockerfile.chat_server
    container_name: kakashi-chat_server
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://kakashi-redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - CHAT_SERVER_PORT=${CHAT_SERVER_PORT:-3001}
      - CLIENT_URL=${CLIENT_URL:-http://kakashi-app:3000}
      - NODE_ENV=development
    volumes:
      - .:/app
    depends_on:
      - kakashi-redis
      - kakashi-psqldb
    networks:
      - app-network

  kakashi-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
    container_name: kakashi-app
    environment:
      - PGUSER=${PGUSER:-postgres}
      - PGPASSWORD=${PGPASSWORD:-postgres}
      - PGHOST=${PGHOST:-kakashi-psqldb}
      - PGDATABASE=${PGDATABASE:-postgres}
      - PGPORT=${PGPORT:-5432}
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - NEXT_PUBLIC_JWT_SECRET=${NEXT_PUBLIC_JWT_SECRET:-dev_secret}
      - NEXT_PUBLIC_SOCKET_URL=http://kakashi-chat_server:3001
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-http://kakashi-chat_server:3001}

    volumes:
      - .:/app
    depends_on:
      - kakashi-chat_server
      - kakashi-psqldb
    networks:
      - app-network

  kakashi-nginx:
    image: nginx:latest
    container_name: kakashi-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - kakashi-app
      - kakashi-chat_server
    networks:
      - app-network
  # kakashi-mcp

volumes:
  redis_data:
  postgres_data:
  qdrant_data:

networks:
  app-network:
    driver: bridge
