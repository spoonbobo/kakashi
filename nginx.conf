worker_processes 1;  # Add this line

events {
    worker_connections 1024; # Add this line
}

http {
    include mime.types;        # Add this line
    default_type application/octet-stream; # Add this line

    upstream next_app {
        server kakashi-next_app:3000;
    }

    upstream chat_server {
        server kakashi-chat_server:3001;
    }

    upstream pgadmin {
        server pgadmin:80;  # Assuming the pgAdmin service is named 'pgadmin'
    }

    server {
        listen 80;
        server_name kakashi-dev.com; # Use localhost for local development

        location / {
            proxy_pass http://next_app;
            proxy_http_version 1.1; # Add this - VERY important for Next.js
            proxy_set_header Upgrade $http_upgrade;  # Add these two lines
            proxy_set_header Connection 'upgrade';   # for WebSocket support in Next.js
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://chat_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        location /pq/ {
            proxy_pass http://pgadmin;  # Ensure the trailing slash is present
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_set_header X-Script-Name /pq;  # Add this line
        }
    }
}